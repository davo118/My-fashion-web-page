<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colour Fit</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #e6f4ea;
  color: #1d1916;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
}

h1 {
  font-size: 32px;
}

select, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  margin-bottom: 15px;
}

button {
  background: black;
  color: white;
  border: none;
  cursor: pointer;
}

.result {
  margin-top: 20px;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
<h1>Find your best colours</h1>
<p>Pick your features and we’ll suggest colours that suit you.</p>

<label>Hair colour</label>
<select id="hair">
<option value="">Select</option>
<option>Blonde</option>
<option>Brown</option>
<option>Black</option>
<option>Red</option>
</select>

<label>Eye colour</label>
<select id="eyes">
<option value="">Select</option>
<option>Blue</option>
<option>Green</option>
<option>Brown</option>
</select>

<label>Skin tone</label>
<select id="skin">
<option value="">Select</option>
<option>Fair</option>
<option>Medium</option>
<option>Dark</option>
</select>

<label>Natural contrast level</label>
<p style="font-size:13px; color:#555;">
How much your features stand out from each other (e.g. light skin + dark hair = high contrast).
</p>
<select id="contrast">
<option value="">Select</option>
<option>Low</option>
<option>Medium</option>
<option>High</option>
</select>

<button onclick="showResult()">Show my colours</button>

<div class="result" id="result"></div>
</div>

<script>
function showResult() {
  const hair = document.getElementById("hair").value;
  const eyes = document.getElementById("eyes").value;
  const skin = document.getElementById("skin").value;
  const contrast = document.getElementById("contrast").value;

  if (!hair || !eyes || !skin || !contrast) {
    document.getElementById("result").innerText = "Fill everything in first.";
    return;
  }

  document.getElementById("result").innerText =
    "You suit clean, balanced colours. Avoid anything too harsh or too dull.";
}
</script>

</body>
</html>
